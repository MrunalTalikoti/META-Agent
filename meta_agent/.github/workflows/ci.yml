name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metaagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/metaagent_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test
      DEBUG: "false"
      # LLM keys intentionally blank — tests use MockProvider
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: meta_agent/requirements.txt

      - name: Install dependencies
        working-directory: meta_agent
        run: |
          pip install -r requirements.txt
          pip install pytest-asyncio ruff apscheduler

      - name: Lint with ruff
        working-directory: meta_agent
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Run database migrations
        working-directory: meta_agent
        run: alembic upgrade head

      - name: Run tests
        working-directory: meta_agent
        run: pytest tests/ -v --asyncio-mode=auto --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f meta_agent/Dockerfile -t metaagent:ci .

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        working-directory: meta_agent
        run: bandit -r app/ -ll -ii --exclude app/tests || true